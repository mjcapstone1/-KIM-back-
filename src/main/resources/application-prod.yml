spring:
  jpa:
    properties:
      hibernate:
        format_sql: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 10
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        compression.type: zstd
        linger.ms: 10
        batch.size: 32768
        delivery.timeout.ms: 120000
        request.timeout.ms: 30000

    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-offset-reset: latest
      max-poll-records: 100
      properties:
        isolation.level: read_committed

    listener:
      ack-mode: manual_immediate
      missing-topics-fatal: false

finvibe:
  kis:
    enabled: ${KIS_ENABLED:false}
    base-url: ${KIS_BASE_URL:https://openapi.koreainvestment.com:9443}
    app-key: ${KIS_APP_KEY:}
    app-secret: ${KIS_APP_SECRET:}
    timeout-ms: ${KIS_TIMEOUT_MS:5000}
  naver:
    news:
      enabled: ${NAVER_NEWS_ENABLED:false}
      base-url: ${NAVER_NEWS_BASE_URL:https://openapi.naver.com/v1/search/news.json}
      client-id: ${NAVER_NEWS_CLIENT_ID:}
      client-secret: ${NAVER_NEWS_CLIENT_SECRET:}
      timeout-ms: ${NAVER_NEWS_TIMEOUT_MS:7000}
  ai:
    openrouter:
      enabled: ${OPENROUTER_ENABLED:false}
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
      api-key: ${OPENROUTER_API_KEY:}
      model: ${OPENROUTER_MODEL:nvidia/nemotron-3-super-120b-a12b:free}
      timeout-ms: ${OPENROUTER_TIMEOUT_MS:20000}
      site-url: ${OPENROUTER_SITE_URL:http://localhost:5173}
  market:
    bootstrap-prices:
      enabled: ${FINVIBE_MARKET_BOOTSTRAP_PRICES_ENABLED:true}
      run-on-startup: ${FINVIBE_MARKET_BOOTSTRAP_PRICES_RUN_ON_STARTUP:true}
      schedule-enabled: ${FINVIBE_MARKET_BOOTSTRAP_PRICES_SCHEDULE_ENABLED:true}
      page-size: ${FINVIBE_MARKET_BOOTSTRAP_PRICES_PAGE_SIZE:50}
      max-pages-per-run: ${FINVIBE_MARKET_BOOTSTRAP_PRICES_MAX_PAGES_PER_RUN:4}
      request-delay-ms: ${FINVIBE_MARKET_BOOTSTRAP_PRICES_REQUEST_DELAY_MS:150}
      refresh-zero-only: ${FINVIBE_MARKET_BOOTSTRAP_PRICES_REFRESH_ZERO_ONLY:true}
      stale-after-minutes: ${FINVIBE_MARKET_BOOTSTRAP_PRICES_STALE_AFTER_MINUTES:180}
      cron: "${FINVIBE_MARKET_BOOTSTRAP_PRICES_CRON:0 0/10 * * * *}"
    candle-backfill:
      enabled: ${FINVIBE_MARKET_CANDLE_BACKFILL_ENABLED:true}
      run-on-startup: ${FINVIBE_MARKET_CANDLE_BACKFILL_RUN_ON_STARTUP:true}
      schedule-enabled: ${FINVIBE_MARKET_CANDLE_BACKFILL_SCHEDULE_ENABLED:true}
      page-size: ${FINVIBE_MARKET_CANDLE_BACKFILL_PAGE_SIZE:50}
      max-pages-per-run: ${FINVIBE_MARKET_CANDLE_BACKFILL_MAX_PAGES_PER_RUN:1}
      points: ${FINVIBE_MARKET_CANDLE_BACKFILL_POINTS:60}
      minimum-points: ${FINVIBE_MARKET_CANDLE_BACKFILL_MINIMUM_POINTS:20}
      request-delay-ms: ${FINVIBE_MARKET_CANDLE_BACKFILL_REQUEST_DELAY_MS:500}
      cron: "${FINVIBE_MARKET_CANDLE_BACKFILL_CRON:0 3/10 * * * *}"
  outbox:
    batch-size: ${OUTBOX_BATCH_SIZE:100}
    poll-delay-ms: ${OUTBOX_POLL_DELAY_MS:500}
    recovery-delay-ms: ${OUTBOX_RECOVERY_DELAY_MS:30000}
    lock-timeout-seconds: ${OUTBOX_LOCK_TIMEOUT_SECONDS:60}
    max-retry-count: ${OUTBOX_MAX_RETRY_COUNT:20}
