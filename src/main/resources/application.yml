spring:
  application:
    name: FinVibe Spring Boot BFF

  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/finvibe}
    username: ${DB_USERNAME:finvibe}
    password: ${DB_PASSWORD:finvibe123}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
    mongodb:
      repositories:
        enabled: true

  mongodb:
    uri: ${MONGODB_URI:mongodb://root:root1234@localhost:27017/finvibe?authSource=admin}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 10
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
      auto-offset-reset: latest
      max-poll-records: 100
      properties:
        isolation.level: read_committed

    listener:
      ack-mode: manual_immediate
      missing-topics-fatal: false

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /v3/api-docs

app:
  version: 1.0.0

finvibe:
  data-dir: ${FINVIBE_DATA_DIR:./runtime}
  jwt:
    secret-key: ${JWT_SECRET_KEY:please-change-this-secret-key}
    access-token-minutes: ${ACCESS_TOKEN_MINUTES:30}
    refresh-token-days: ${REFRESH_TOKEN_DAYS:14}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
  kis:
    enabled: ${KIS_ENABLED:true}
    base-url: ${KIS_BASE_URL:https://openapi.koreainvestment.com:9443}
    app-key: ${KIS_APP_KEY:PSRWNqROeOKnU9IftdxTH9S0mfoZaZKNEQTu}
    app-secret: ${KIS_APP_SECRET:iKUtliChzBs+2rgtiYttCK5FqasBslTygUzFoAlbue5+DA6nNMgugtADWMwD8gIctAExpsSNy1U6qousrABQXOfyy+wvC/JwfXQfvs6a3TFMxpBqtU4oQfmupna3X4pK0vZVXHsuWj4iSYzF+hwYnVwrijfBgclv43ex75FKGrAA39cgzfA=}
    timeout-ms: ${KIS_TIMEOUT_MS:5000}

  outbox:
    batch-size: 100
    poll-delay-ms: 500
    recovery-delay-ms: 30000
    lock-timeout-seconds: 60
    max-retry-count: 20
